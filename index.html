  const scale=Math.min(innerWidth/W,innerHeight/H);

}
resizeCanvas();
addEventListener('resize',resizeCanvas);

  }
}

let state='loading',score=0,combo=0,maxCombo=0,highScore=0,stage=1;
let player,bullets=[],enemies=[],items=[],particles=[],popups=[],stars=[];
let enemyTimer=0,itemTimer=0,T=0;

function makeStars(){
  stars=[];
  for(let i=0;i<(W*H)/2000;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:.5+Math.random()*1.5,sp:.1+Math.random()*.3});
}
function getGroundY(){return H-(isPortrait()?100:60)}
function getPlayerStartY(){return getGroundY()-70}

function reset(){
  const p=isPortrait();
  player={x:W/2-24,y:getPlayerStartY(),w:48,h:56,vx:0,vy:0,on:true,fr:true,st:0,inv:0,lives:5,walkT:0,bobT:0,movePower:0};
  bullets=[];enemies=[];items=[];particles=[];popups=[];
  score=0;combo=0;enemyTimer=0;itemTimer=0;stage=1;T=0;
  makeStars();
}

function mkPopup(x,y,t,c){return{x,y,text:t,color:c||'#ffcc44',vy:-2.5,life:40}}
function mkParticle(x,y,c,vx,vy){return{x,y,vx:vx||(Math.random()-.5)*5,vy:vy||-Math.random()*4-1,life:18+Math.random()*15,maxL:33,color:c||'#ffcc66',sz:2+Math.random()*3}}
function mkItem(x,y,t){return{x,y,w:22,h:22,type:t||'star',vy:1,life:180}}

let touch={active:false,startX:0,startY:0,curX:0,curY:0,startTime:0,flicked:false};
function screenToGame(cx,cy){
  const rect=canvas.getBoundingClientRect();
  return{x:(cx-rect.left)/rect.width*W,y:(cy-rect.top)/rect.height*H};
}
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state==='title'||state==='over'){state='play';reset();return}
  const t=e.changedTouches[0];
  const g=screenToGame(t.clientX,t.clientY);
  touch={active:true,startX:g.x,startY:g.y,curX:g.x,curY:g.y,startTime:Date.now(),flicked:false};
},false);
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!touch.active||state!=='play')return;
  const t=e.changedTouches[0];
  const g=screenToGame(t.clientX,t.clientY);
  touch.curX=g.x;touch.curY=g.y;
  const dy=g.y-touch.startY;
  if(dy<-35&&!touch.flicked){touch.flicked=true;if(player&&player.on){player.vy=-12;player.on=false}}
},false);
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!touch.active)return;
  if(Date.now()-touch.startTime<180&&!touch.flicked){if(player&&player.on){player.vy=-12;player.on=false}}
  touch.active=false;
},false);
canvas.addEventListener('touchcancel',e=>{e.preventDefault();touch.active=false},false);

canvas.addEventListener('mousedown',e=>{
  if(state==='title'||state==='over'){state='play';reset();return}
  const g=screenToGame(e.clientX,e.clientY);
  touch={active:true,curX:g.x,curY:g.y,startTime:Date.now(),flicked:false};
});
canvas.addEventListener('mousemove',e=>{if(!touch.active||state!=='play')return;touch.curX=screenToGame(e.clientX,e.clientY).x});
canvas.addEventListener('mouseup',e=>{if(!touch.active)return;if(Date.now()-touch.startTime<180&&player&&player.on){player.vy=-12;player.on=false}touch.active=false});

function update(){
  T+=0.016;
  if(state!=='play')return;
  const p=player;if(!p)return;
  
  if(touch.active){
    const center=W/2;
    const offset=(touch.curX-center)/center;
    p.movePower=Math.max(-1,Math.min(1,offset));
  }else{
    p.movePower*=0.85;
    if(Math.abs(p.movePower)<0.01)p.movePower=0;
  }
  p.vx=p.movePower*3.5;
  if(Math.abs(p.vx)>0.3){p.walkT+=Math.abs(p.vx)*0.04;p.fr=p.vx>0}else{p.walkT=0;p.vx=0}
  p.bobT+=0.03;
  p.vy+=0.55;if(p.vy>15)p.vy=15;
  p.y+=p.vy;p.x+=p.vx;
  const GY=getGroundY();
  if(p.y+p.h>=GY){p.y=GY-p.h;p.vy=0;p.on=true}else{p.on=false}
  if(p.x<0)p.x=0;if(p.x>W-p.w)p.x=W-p.w;
  
  if(touch.active&&Date.now()-touch.startTime>200){
    if(p.st<=0){p.st=7;bullets.push({x:p.x+p.w/2-5,y:p.y-8,w:10,h:10,vy:-10,life:35})}
  }
  if(p.st>0)p.st--;if(p.inv>0)p.inv--;
  
  for(const s of stars){s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W}}
  
  const portrait=isPortrait();
  enemyTimer++;
  if(enemyTimer>Math.max(22,55-stage*3)){
    enemyTimer=0;
    const r=Math.random();
    let t='slime',sp=1+Math.random();
    if(r<.50){}else if(r<.78){t='bat';sp=1.5+Math.random()*1.5}else{t='dark_slime';sp=2+Math.random()}
    if(portrait){
      enemies.push({type:t,x:20+Math.random()*(W-70),y:-40,w:36,h:32,vx:(Math.random()-.5),vy:sp,anim:Math.random()*6.28,time:0,sq:1});
    }else{
      const fromRight=Math.random()>.5;
      enemies.push({type:t,x:fromRight?W+20:-40,y:GY-40+Math.random()*(GY-100),w:36,h:32,vx:fromRight?-sp:sp,vy:0,anim:Math.random()*6.28,time:0,sq:1});
    }
  }
  itemTimer++;
  if(itemTimer>200+Math.random()*250){
    itemTimer=0;
    items.push(mkItem(30+Math.random()*(W-60),portrait?-20:GY-100,Math.random()<.6?'star':'heart'));
  }
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];if(portrait){b.y+=b.vy}else{b.y+=b.vy*0.7}b.life--;if(b.y<-20||b.y>H+20||b.life<=0)bullets.splice(i,1);
  }
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];e.x+=e.vx;e.y+=e.vy;e.time+=0.05;e.anim+=0.05;e.sq=1+Math.sin(e.anim*3)*0.08;
    if(portrait){
      if(e.type==='bat'){e.x+=Math.sin(e.time)*1.2;e.vy+=Math.sin(e.anim*2)*0.1}
      else if(e.type==='dark_slime'){e.vx=Math.sin(e.anim*1.5)*0.6}
      if(e.y>H+30){enemies.splice(i,1);continue}
    }else{
      if(e.type==='bat'){e.y+=Math.sin(e.time)*1.5}
      else if(e.type==='dark_slime'){e.vy=Math.sin(e.anim)*0.5}
      if(e.x<-60||e.x>W+60){enemies.splice(i,1);continue}
    }
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){
        combo++;maxCombo=Math.max(maxCombo,combo);
        const pts=10+combo*3;score+=pts;
        popups.push(mkPopup(e.x+e.w/2,e.y-10,'+'+pts));
        for(let k=0;k<14;k++){const a=Math.random()*6.28,spd=1+Math.random()*3;particles.push(mkParticle(e.x+e.w/2,e.y+e.h/2,['#ffcc66','#c866ff','#ff99cc','#ff6644'][Math.floor(Math.random()*4)],Math.cos(a)*spd,-Math.sin(a)*spd-1))}
        enemies.splice(i,1);bullets.splice(j,1);break;
      }
    }
  }
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(!p.inv&&p.x+p.w>e.x&&p.x<e.x+e.w&&p.y+p.h>e.y&&p.y<e.y+e.h){
      combo=0;p.inv=90;p.lives--;
      for(let k=0;k<18;k++){const a=Math.random()*6.28;particles.push(mkParticle(p.x+p.w/2,p.y+p.h/2,'#ff4444',Math.cos(a)*4,-Math.sin(a)*4-2))}
      if(p.lives<=0){state='over';return}
      p.vy=-8;enemies.splice(i,1);
    }
  }
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];it.y+=it.vy;
    if(p.x+p.w>it.x&&p.x<it.x+it.w&&p.y+p.h>it.y&&p.y<it.y+it.h){
      if(it.type==='heart'){p.lives=Math.min(5,p.lives+1);popups.push(mkPopup(it.x,it.y-10,'+1❤️','#ff6688'))}
      else{score+=50;popups.push(mkPopup(it.x,it.y-10,'+50⭐','#66ccff'))}
      for(let k=0;k<8;k++)particles.push(mkParticle(it.x+10,it.y+10,it.type==='heart'?'#ff6688':'#66ccff'));
      items.splice(i,1);continue;
    }
    if(it.y>H+20||it.life<=0)items.splice(i,1);
  }
  for(let i=particles.length-1;i>=0;i--){const p2=particles[i];p2.x+=p2.vx;p2.y+=p2.vy;p2.vy+=.25;p2.life--;if(p2.life<=0)particles.splice(i,1)}
  for(let i=popups.length-1;i>=0;i--){const p2=popups[i];p2.y+=p2.vy;p2.vy+=.15;p2.life--;if(p2.life<=0)popups.splice(i,1)}
  const ns=Math.floor(score/200)+1;
  if(ns>stage){stage=ns;popups.push(mkPopup(W/2,H/2-30,'STAGE '+stage+'!','#ffdd44'));enemyTimer=0}
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0a1e';ctx.fillRect(0,0,W,H);
  const GY=getGroundY();
  const portrait=isPortrait();
  for(const s of stars){ctx.fillStyle='rgba(255,255,255,'+(.15+s.s*.1+Math.sin(T*2+s.x)*.05)+')';ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fill()}
  if(SPRITES.bg_mountains){
    const mh=portrait?80:60;
    for(let i=0;i<Math.ceil(W/140)+1;i++)ctx.drawImage(SPRITES.bg_mountains,i*140-20,GY-50,140,mh);
  }
  if(SPRITES.tile_ground){
    const tsize=portrait?128:96;
    for(let x=0;x<W;x+=tsize)ctx.drawImage(SPRITES.tile_ground,x,GY,tsize,portrait?100:60);
  }
  const pu=Math.sin(T*3)*0.05+0.08;
  ctx.fillStyle='rgba(168,85,247,'+pu+')';ctx.fillRect(0,GY,W,3);
  
  for(const it of items){const sk=SPRITES[it.type==='heart'?'item_heart':'item_star'];if(sk){ctx.drawImage(sk,it.x,it.y+Math.sin(T*3+it.x)*2,it.w,it.h)}}
  for(const e of enemies){
    let sk=SPRITES.enemy_slime;
    if(e.type==='bat')sk=SPRITES.enemy_bat;
    else if(e.type==='dark_slime')sk=SPRITES.enemy_dark_slime;
    if(sk){ctx.save();ctx.translate(e.x+e.w/2,e.y+e.h/2);ctx.scale(1/e.sq,e.sq);ctx.drawImage(sk,-e.w/2,-e.h/2,e.w,e.h);ctx.restore()}
  }
  for(const b of bullets){if(SPRITES.bullet){ctx.save();ctx.translate(b.x+b.w/2,b.y+b.h/2);ctx.rotate(T*10);ctx.drawImage(SPRITES.bullet,-b.w/2,-b.h/2,b.w,b.h);ctx.restore()}}
  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/p.maxL);ctx.fillStyle=p.color;const sz=p.sz*(p.life/p.maxL*0.5+0.5);ctx.fillRect(p.x-sz/2,p.y-sz/2,sz,sz)}
  ctx.globalAlpha=1;
  for(const p of popups){ctx.globalAlpha=Math.max(0,p.life/40);ctx.fillStyle=p.color;ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y)}
  ctx.globalAlpha=1;
  
  if(player&&state==='play'){
    const p=player;
    let sk=SPRITES.gram_stand;
    if(!p.on)sk=SPRITES.gram_jump;
    else if(Math.abs(p.vx)>0.3){sk=Math.floor(p.walkT)%2===0?SPRITES.gram_run1:SPRITES.gram_run2}
    const by=p.on?Math.sin(p.bobT)*1.5:0;
    if(sk){ctx.save();if(p.fr){ctx.drawImage(sk,p.x,p.y+by,p.w,p.h)}else{ctx.scale(-1,1);ctx.drawImage(sk,-(p.x+p.w),p.y+by,p.w,p.h)};ctx.restore()}
    if(p.inv>0&&Math.floor(T*30)%2){ctx.fillStyle='rgba(255,200,255,.3)';ctx.fillRect(p.x,p.y,p.w,p.h)}
    if(touch.active&&Date.now()-touch.startTime>200&&p.st>5){ctx.fillStyle='rgba(255,200,50,.5)';ctx.beginPath();ctx.arc(p.x+p.w/2,p.y-6,6,0,Math.PI*2);ctx.fill()}
  }
  
  ctx.textAlign='left';
  ctx.fillStyle='#fff';ctx.font='bold '+Math.max(12,Math.min(16,16*360/W))+'px sans-serif';
  ctx.fillText('SCORE: '+score,8,22);
  ctx.fillStyle=combo>=3?'#ffcc44':'#888';ctx.font=Math.max(10,Math.min(12,12*360/W))+'px sans-serif';
  ctx.fillText('COMBO x'+combo,8,38);
  ctx.fillStyle='#ff99cc';ctx.font='bold 10px sans-serif';ctx.fillText('STAGE '+stage,8,52);
  ctx.textAlign='right';
  let hs='';for(let i=0;i<player.lives;i++)hs+='❤️';
  ctx.fillStyle='#ff6688';ctx.font=Math.max(12,Math.min(14,14*360/W))+'px sans-serif';ctx.fillText(hs,W-8,22);
  ctx.fillStyle='#d8a0f0';ctx.font='bold 10px sans-serif';ctx.fillText('HIGH: '+highScore,W-8,38);
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.15)';ctx.font='9px sans-serif';
  ctx.fillText(portrait?'📱 PORTRAIT':'🖥 LANDSCAPE',W/2,H-8);
  
  if(state==='title'){
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,H);
    const tscale=portrait?1:0.7;
    if(SPRITES.gram_stand){ctx.drawImage(SPRITES.gram_stand,W/2-70*tscale,H/2-120*tscale+Math.sin(T*2)*3,140*tscale,160*tscale)}
    ctx.shadowColor='#a855f7';ctx.shadowBlur=25;
    ctx.fillStyle='#e8c0f8';ctx.font='bold '+(portrait?26:20)+'px sans-serif';ctx.textAlign='center';
    const tb=Math.sin(T*1.5)*2;
    ctx.fillText('🦋 グラムちゃん',W/2,H/2-165*tscale+tb);
    ctx.fillStyle='#ff99cc';ctx.font='bold '+(portrait?18:14)+'px sans-serif';
    ctx.fillText('2D アクション',W/2,H/2-135*tscale+tb);
    ctx.shadowBlur=0;
    ctx.fillStyle='#88ddff';ctx.font=(portrait?'10px':'9px')+' sans-serif';
    ctx.fillText('👆左右スライド:移動 タップ:ジャンプ 長押し:連射',W/2,H/2+50);
    ctx.fillStyle='#666';ctx.font='9px sans-serif';
    ctx.fillText('💜 For ロドリンお兄ちゃん 💜',W/2,H-24);
    const p2=Math.sin(T*3)*0.3+0.7;
    ctx.fillStyle='rgba(255,200,50,'+p2+')';ctx.font='bold '+(portrait?14:12)+'px sans-serif';
    ctx.fillText('▶ タップしてスタート ◀',W/2,H/2+85);
  }
  if(state==='over'){
    ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.shadowColor='#ff99cc';ctx.shadowBlur=16;
    ctx.fillStyle='#ff99cc';ctx.font='bold '+(portrait?30:24)+'px sans-serif';
    ctx.fillText('GAME OVER 💜',W/2,H/2-70+Math.sin(T*2)*3);
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.font='bold '+(portrait?20:16)+'px sans-serif';
    ctx.fillText('SCORE: '+score,W/2,H/2-20);
    ctx.fillStyle='#88ddff';ctx.font=(portrait?13:11)+'px sans-serif';
    ctx.fillText('Max Combo: x'+maxCombo,W/2,H/2+15);
    ctx.fillStyle='#aaa';ctx.font=(portrait?11:10)+'px sans-serif';
    ctx.fillText('Stage: '+stage,W/2,H/2+40);
    if(score>highScore){highScore=score;ctx.fillStyle='#ffdd44';ctx.fillText('★ NEW HIGH SCORE! ★',W/2,H/2+65)}
    const p3=Math.sin(T*3)*.3+.7;
    ctx.fillStyle='rgba(255,200,50,'+p3+')';ctx.font='bold '+(portrait?14:12)+'px sans-serif';
    ctx.fillText('▶ タップして再開 ◀',W/2,H/2+100);
  }
}

function loop(){update();draw();requestAnimationFrame(loop)}

load(()=>{
  document.getElementById('loading').style.display='none';
  state='title';
  reset();
  loop();
});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'){if(player){player.movePower=-1;player.fr=false}}
  if(e.key==='ArrowRight'||e.key==='d'){if(player){player.movePower=1;player.fr=true}}
  if(e.key==='ArrowUp'||e.key==='w'||e.key===' '){
    e.preventDefault();
    if(state==='title'||state==='over'){state='play';reset();return}
    if(player&&player.on){player.vy=-12;player.on=false}
  }
  if(e.key==='z'||e.key==='x'||e.key==='j'){
    if(state==='title'||state==='over'){state='play';reset();return}
    if(player&&player.st<=0){player.st=7;bullets.push({x:player.x+player.w/2-5,y:player.y-8,w:10,h:10,vy:-10,life:35})}
  }
  if(e.key==='Escape'){if(state==='over')state='title';reset()}
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'){if(player&&Math.abs(player.vx)<1)player.movePower=0}
  if(e.key==='ArrowRight'||e.key==='d'){if(player&&Math.abs(player.vx)<1)player.movePower=0}
});
</script>
</body>
